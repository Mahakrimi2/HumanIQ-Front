<app-navbar></app-navbar>
<app-sidebar></app-sidebar>

<main id="main" class="main">
  <div class="pagetitle">
    <h1>My Contracts</h1>
    <nav>
      <ol class="breadcrumb">
        <li class="breadcrumb-item active">My Contracts</li>
      </ol>
    </nav>
  </div>

  <section class="section">
    <div class="row">
      <div class="col-lg-12">
        <div class="card">
          <div class="card-body">
            <h5 class="card-title">My Contract History</h5>

            <!-- Section des contrats sous forme de cartes -->
            <div class="row">
              <!-- Exemple de carte de contrat -->
              <div class="col-md-4" *ngFor="let contract of contracts">
                <div class="card contract-card mb-4 shadow-sm">
                  <div class="card-header bg-gradient-to-r from-primary to-secondary text-white">
                    <h5 class="card-title mb-0">{{ contract.contractType }}</h5>
                  </div>
                  <div class="card-body">
                    <p class="card-text"><strong>Start Date:</strong> {{ contract.startDate }}</p>
                    <p class="card-text"><strong>End Date:</strong> {{ contract.endDate }}</p>
                    <p class="card-text"><strong>Status:</strong> <span class="badge bg-success">{{ contract.status }}</span></p>
                    <p class="card-text"><strong>Salary:</strong> {{ contract.salary }}</p>
                  </div>
                  <div class="card-footer bg-transparent">
                    <!-- Bouton d'impression -->
                    <button class="btn btn-sm btn-outline-secondary" (click)="downloadContract(contract.id)">
                      <i class="bi bi-printer"></i> Print
                    </button>
                  </div>
                </div>
              </div>
              <!-- Fin de l'exemple de carte de contrat -->
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>
